name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # The Google client secret lives only in the Worker secret store; it must
      # never appear in the static bundle.
      - name: Verify no client secret in dist
        run: |
          if grep -rqE 'GOCSPX-[A-Za-z0-9_-]+' dist/; then
            echo "ERROR: a client secret was found in dist/ — aborting deploy." >&2
            exit 1
          fi
      - uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 93527c9983d1c08638cb9c1de99f0450
